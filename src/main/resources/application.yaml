server:
  port: 8080

spring:
  application:
    name: k8s-demo-spring-boot
  datasource:
    url: jdbc:mysql://localhost:3306/k8s?createDatabaseIfNotExist=true
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    
